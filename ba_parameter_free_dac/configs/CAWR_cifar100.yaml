defaults:
  - base

name: CAWR_cifar100
agent:
  type: CosineAnnealingWRAgent
  T_0: 10
  eta_min: 0
  base_lr: 0.005
  t_mult: 2
num_episodes: 1
optimizer_type: adam

hydra:
  launcher:
    timeout_min: 600

dacbench_sgd_config:
  epoch_mode: False # in SGDWR paper lr is adapted every mini batch 
  cutoff: 33750 # 50000*0.8=40000 -> 40000/64 = 675 -> 50 episodes = 50*675=33750
  dataset_name: CIFAR100
  fraction_of_dataset: 1.0
  torch_hub_model: ["chenyaofo_pytorch-cifar-models_master", "cifar100_resnet20", False]