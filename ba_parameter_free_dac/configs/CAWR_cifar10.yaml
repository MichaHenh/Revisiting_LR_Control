defaults:
  - base

name: CAWR_cifar10
agent:
  type: CosineAnnealingWRAgent
  T_0: 10
  eta_min: 0
  base_lr: 0.005
  t_mult: 2
num_episodes: 1
optimizer_type: adam

hydra:
  launcher:
    timeout_min: 1200

dacbench_sgd_config:
  epoch_mode: False # in SGDWR paper lr is adapted every mini batch
  use_validation: false
  use_testing: false
  cutoff: 11250 # 50000*0.6*0.8=24000 -> 28800/64 = 375 -> 30 episodes = 30*375=11250
  dataset_name: CIFAR10
  fraction_of_dataset: 1.0
  torch_hub_model: ["chenyaofo_pytorch-cifar-models_master", "cifar10_resnet20", False]