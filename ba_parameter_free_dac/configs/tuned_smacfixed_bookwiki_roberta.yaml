defaults:
  - override hydra/launcher: submitit_slurm

name: tuned_smacfixed_roberta_bookwiki
seed: 1
use_evaluation: true
steps: 23000

optimizer:
  type: adam
  lr: 0.6095486659939
  weight_decay: 0
  betas: [0.9, 0.98]

# TODO needs to be adjusted
hydra:
  run:
    dir: results/${name}
  sweep:
    dir: results/${name}
  job:
    chdir: true
  launcher:
    timeout_min: 360
    partition: null
    cpus_per_task: 4
    gres: "gpu:4"
    mem_gb: 256
    nodes: 1
    tasks_per_node: 4
