defaults:
  - override hydra/launcher: submitit_slurm

name: Adam_fixed_roberta_bookwiki/seed_${seed}
seed: 1
use_evaluation: true
steps: 23000

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.01

# TODO needs to be adjusted
hydra:
  run:
    dir: results/${name}
  sweep:
    dir: results/${name}
  job:
    chdir: true
  launcher:
    timeout_min: 4320
    cpus_per_task: 4
    gres: "gpu:4"
    mem_gb: 256
    nodes: 1
    tasks_per_node: 8  