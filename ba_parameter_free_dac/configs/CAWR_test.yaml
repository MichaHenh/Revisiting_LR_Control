defaults:
  - cluster/local

hydra:
  run:
    dir: results/${name}_${dacbench_sgd_config.dataset_name}
  sweep:
    dir: results/${name}_${dacbench_sgd_config.dataset_name}
  job:
    chdir: true

name: CAWR_test
seeds: [1]
agent:
  type: CosineAnnealingWRAgent
  T_0: 10
  eta_min: 0
  base_lr: 0.05
  t_mult: 2
num_episodes: 1
optimizer_type: adam
track_effective_lr: False

dacbench_sgd_config:
  epoch_mode: False
  cutoff: 500
  dataset_name: FashionMNIST