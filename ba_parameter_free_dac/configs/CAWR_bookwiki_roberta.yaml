defaults:
  - override hydra/launcher: submitit_slurm

name: CAWR_roberta_bookwiki
seed: 1
use_evaluation: true
steps: 23000

optimizer:
  type: CosineAnnealingWRAgent
  T_0: 10
  eta_min: 0
  base_lr: 0.005
  t_mult: 2

# TODO needs to be adjusted
hydra:
  run:
    dir: results/${name}
  sweep:
    dir: results/${name}
  job:
    chdir: true
  launcher:
    timeout_min: 360
    partition: null
    cpus_per_task: 4
    gres: "gpu:4"
    mem_gb: 256
    nodes: 1
    tasks_per_node: 4