defaults:
  - override hydra/launcher: submitit_slurm

name: ProdigyAdam_roberta_bookwiki/seed_${seed}
seed: 1
use_evaluation: true
manual_ddp: true
nproc: 4
steps: 23000

optimizer:
  type: ProdigyAdam
  lr: 1
  weight_decay: 0
  decouple: true
  betas: [0.9, 0.98]

# TODO needs to be adjusted
hydra:
  run:
    dir: results/${name}
  sweep:
    dir: results/${name}
  job:
    chdir: true
  launcher:
    timeout_min: 360
    partition: null
    cpus_per_task: 4
    gres: "gpu:4"
    mem_gb: 256
    nodes: 1
    tasks_per_node: 4