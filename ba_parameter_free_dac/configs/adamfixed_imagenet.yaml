defaults:
  - base
  - cluster/gpu_kisski

name: Adam_fixed_imagenet
optimizer_type: adam
agent:
  type: StaticAgent
  lr: 0.001
num_episodes: 1

dacbench_sgd_config:
  cutoff: 100
  device: cuda
  dataset_name: IMAGENET
  fraction_of_dataset: 1.0
  custom_model: efficientnet_b4

hydra:
  launcher:
    partition: null
    timeout_min: 300
    gres: "gpu:1"
    nodes: 1
    mem_gb: 16