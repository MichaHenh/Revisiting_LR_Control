defaults:
  - base

name: SMAC_fixed_libsvm/${dacbench_sgd_config.dataset_name}
optimizer_type: adam
num_episodes: ${smac.n_trials}

hydra:
  launcher:
    timeout_min: 120
    cpus_per_task: 4
    mem_gb: 8

smac:
  optimizer_type: adam
  n_trials: 50
  lr_min: 0
  lr_max: 0.1
  lr_default: 0.001
  dacbench_sgd_config:
    cutoff: 10
    use_validation: false
    use_testing: false
    use_validation_as_test: True
    dataset_name: ${dacbench_sgd_config.dataset_name}
    instance_set_path: ../../../../../instance_sets/sgd/sgd_train_100instances.csv
    fraction_of_dataset: 1.0
    custom_model: logistic_reg_${dacbench_sgd_config.dataset_name}

dacbench_sgd_config:
  cutoff: 100
  dataset_name: iris
  fraction_of_dataset: 1.0
  custom_model: logistic_reg_${dacbench_sgd_config.dataset_name}