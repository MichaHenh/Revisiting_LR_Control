defaults:
  - base
  - override hydra/sweeper: HyperSMAC
  - override hydra/launcher: submitit_slurm

hydra:
  sweeper:
    n_trials: 50
    budget_variable: cutoff
    sweeper_kwargs:
      optimizer_kwargs:
        smac_facade: 
          _target_: smac.facade.multi_fidelity_facade.MultiFidelityFacade
          _partial_: true
        intensifier: 
          _target_: smac.intensifier.hyperband.Hyperband
          _partial_: true
        scenario:
          n_trials: ${hydra.sweeper.n_trials}
          seed: ${seed}
          min_budget: 20
          max_budget: 100
          deterministic: true
          n_workers: 1
          output_directory: ${hydra.sweep.dir}
    search_space:
      hyperparameters:
        lr:
          type: uniform_float
          lower: 0
          upper: 1
          default: 0.001
          log: false
  run:
    dir: results/${name}
  sweep:
    dir: results/${name}
  job:
    chdir: true
  launcher:
    timeout_min: 720
    cpus_per_task: 4
    mem_gb: 8

lr: 0.001
cutoff: 300

name: SMAC_fixed_libsvm/${dacbench_sgd_config.dataset_name}
optimizer_type: adam
agent:
  type: StaticAgent
  lr: ${lr}
num_episodes: 1

dacbench_sgd_config:
  cutoff: ${cutoff}
  use_validation: false
  use_testing: false
  use_validation_as_test: True
  dataset_name: iris
  fraction_of_dataset: 1.0
  custom_model: logistic_reg_${dacbench_sgd_config.dataset_name}